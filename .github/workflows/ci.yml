name: harness-ci

# Regression gate. Runs the two suites on every push/PR so a green main is enforced:
#   - tests/run_units.py : harness internals
#   - tests/run_all.py   : validators (mechanical gates)
# Node is required because run_units' merge-back wrapper invokes `node --test`.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: harness-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Show toolchain
        run: |
          python --version
          node --version

      - name: run_units (harness internals — must be 0-fail)
        working-directory: scripts
        env:
          CLAUDE_HOME: ${{ github.workspace }}
        run: python tests/run_units.py

      - name: run_all (validators — 0-fail)
        working-directory: scripts
        env:
          CLAUDE_HOME: ${{ github.workspace }}
        run: python tests/run_all.py
