# flutter.overlay.yaml — flutter overlay (diffed vs neutral core).
# load_merged('flutter') reproduces stages-flutter.yaml (test_flutter_golden_pin).
stack: flutter
source_finder: find_dart_sources
testgen:
  framework: flutter_gherkin
  runner_cmd: flutter test
applicable_stages:
- requirements
- prd
- flowchart
- convention
- conceptual-design
- er-diagram
- logical-design
- ddl
- api-spec
- scaffolding
- implementation
- wiring-verify
- unit-test
- integration-test
stages:
  requirements:
    gate:
    - 모든 도메인에 1개 이상의 스토리가 존재
    - 각 스토리에 AC(성공+에러 쌍)가 정의됨
    skills:
    - doc-writer
  prd:
    gate:
    - 모든 스토리가 기능 명세로 상세화됨
    - 비기능 요구사항(성능, 보안)이 수치로 명시됨
    skills:
    - doc-writer
  flowchart:
    gate:
    - 핵심 기능의 플로우 존재
    - 분기 조건과 예외 흐름 명시
    skills:
    - flow-design
  convention:
    artifact: 디렉토리 구조, 네이밍, DTO 형식, 에러 코드 규칙
    gate:
    - 디렉토리 구조 테이블 존재 (lib/src/ 하위)
    - DTO 네이밍 규칙 존재 (Req*/Res*/Dto 등)
    - 에러 코드 체계 정의됨 (prefix + status + message)
    skills:
    - convention
  conceptual-design:
    artifact: 엔티티 식별 (drift table candidate), 핵심 속성
    gate:
    - 모든 도메인의 엔티티 식별
    - 엔티티별 핵심 속성 나열
    skills:
    - db-design
  er-diagram:
    artifact: 엔티티 관계도, 카디널리티
    gate:
    - 엔티티 간 관계 시각화
    - M:N 해소 방안 명시
    skills:
    - db-design
  logical-design:
    artifact: drift Table 컬럼, 타입, 제약, 인덱스
    gate:
    - 모든 엔티티가 drift Table로 변환
    - PK/UK 제약 명시
    skills:
    - db-design
  ddl:
    name: drift 스키마 (물리적 설계)
    output: lib/src/database/tables/*.dart
    artifact: drift @DataClassName Table 클래스 + migration strategy
    gate:
    - flutter pub run build_runner build 성공
    - drift 스키마 버전 증가 (SchemaVersion)
    - logical-design과 1:1 대응
  api-spec:
    name: 소켓/HTTP 계약 명세
    input:
    - prd.md
    - flowchart.md
    - logical-design.md
    - convention.md
    artifact: Action별 Req/Res DTO, HTTP 엔드포인트별 body, 에러 코드
    gate:
    - 모든 스토리에 대응하는 Action/Endpoint 존재
    - Req/Res 필드가 logical-design과 정합
    - 에러 응답이 convention 에러 코드 체계 준수
    skills:
    - flow-design
  scaffolding:
    name: 프로젝트 뼈대 (Flutter)
    input:
    - convention.md
    output: pubspec.yaml + lib/src/ 공통 클래스
    artifact: 의존성, 디렉토리 구조, 공통 DTO/예외, Riverpod 설정
    gate:
    - flutter pub get 성공
    - 디렉토리 구조가 convention.md와 일치
    - main.dart entry 컴파일 성공
    skills:
    - scaffolding
  implementation:
    name: 구현 (Dart)
    input:
    - api-spec.md
    - flowchart.md
    - convention.md
    - domain/*.md (있다면)
    output: 도메인별 DTO + Service + Repository + UI
    artifact: API 계약 + 플로우대로 동작하는 코드
    gate:
    - dart analyze 0 errors
    - flutter build (대상 플랫폼) 성공
    - 모든 Action의 DTO↔Service 체인 존재
    skills:
    - backend
  wiring-verify:
    artifact: 계층 간 연결 + DI 주입 검증
    gate:
    - ApplicationContext/Provider 주입 무결성
    - 모든 Action → 핸들러 매핑 존재
    - dart analyze 0 warnings (신규 코드 한정)
    skills:
    - verification
  unit-test:
    name: Unit 테스트 (flutter test)
    output: test/ 디렉토리 + 테스트 리포트
    artifact: DTO fromJson/toJson, 에러 enum, 서비스 로직 테스트
    gate:
    - flutter test 성공, 0 failures
    - 각 공개 메서드에 정상/예외 케이스 존재
    - mocktail 사용 최소화 (feedback_avoid_mock)
    skills:
    - testing
  integration-test:
    name: 통합 테스트 (실기기/에뮬레이터)
    dge: evaluator
    input:
    - api-spec.md
    - unit-test 통과된 코드
    output: integration-report.md
    artifact: 실 서버/디바이스 연동 시나리오
    optional: true
    gate:
    - 핵심 플로우 happy path PASS
    - 네트워크 실패/타임아웃 시나리오 PASS
    skills:
    - testing
