# stages.core.yaml — stack-NEUTRAL pipeline core (unified-pipeline D2).
# Generated by cli.gen_pipeline_core_overlay. gate/skills are stack-specific
# (see overlays/<lang>.overlay.yaml); this core has neutral fields + tool-free
# gate_intent. Merge: lib.pipeline_overlay.load_merged.
stages:
- id: requirements
  name: 요구사항 명세 (사용자 스토리)
  dge: designer
  input: 사용자 요구사항 (대화/문서)
  output: requirements.md
  artifact: 도메인별 사용자 스토리 + 인수 조건(AC)
  gate_intent:
  - 모든 도메인에 1개 이상의 스토리가 존재
  - 각 스토리에 AC(성공+에러 쌍)가 정의됨
  skills_intent:
  - doc-writer
- id: prd
  name: PRD (상세 요구사항)
  dge: designer
  input:
  - requirements.md
  output: prd.md
  artifact: 프로젝트 목표, 범위, 기능 명세, 비기능 요구사항, 용어 정의
  gate_intent:
  - 모든 스토리가 기능 명세로 상세화됨
  - 비기능 요구사항(성능, 보안)이 수치로 명시됨
  - 도메인 용어 사전이 존재
  skills_intent:
  - doc-writer
- id: flowchart
  name: 도메인 플로우차트
  dge: designer
  input:
  - prd.md
  output: flowchart.md
  artifact: 도메인별 사용자 흐름, 상태 전이, 분기 조건
  gate_intent:
  - PRD 핵심 기능에 대응하는 플로우가 존재
  - 분기 조건과 예외 흐름이 명시됨
  skills_intent:
  - flow-design
- id: convention
  name: 프로젝트 컨벤션
  dge: designer
  input:
  - prd.md
  output: convention.md
  artifact: 패키지 구조, 네이밍, 응답 형식, 에러 코드 규칙
  gate_intent:
  - 패키지 구조 테이블 존재
  - DTO 네이밍 규칙 존재
  - 공통 응답 래퍼 형식 정의됨
  - 에러 코드 체계 정의됨
  skills_intent:
  - convention
- id: conceptual-design
  name: 개념적 DB 설계
  dge: designer
  input:
  - prd.md
  - flowchart.md
  output: conceptual-design.md
  artifact: 엔티티 식별, 핵심 속성, 비즈니스 규칙 정리
  gate_intent:
  - 모든 도메인의 엔티티가 식별됨
  - 엔티티별 핵심 속성이 나열됨
  - 비즈니스 규칙(제약, 계산)이 명시됨
  skills_intent:
  - db-design
- id: er-diagram
  name: E-R 다이어그램
  dge: designer
  input:
  - conceptual-design.md
  output: er-diagram.md
  artifact: 엔티티 관계도 (1:1, 1:N, M:N), 카디널리티, 참여 제약
  gate_intent:
  - 모든 엔티티 간 관계와 카디널리티가 시각화됨
  - M:N 관계의 해소 방안(교차 테이블)이 명시됨
  skills_intent:
  - db-design
- id: logical-design
  name: 논리적 DB 설계
  dge: designer
  input:
  - er-diagram.md
  - convention.md
  output: logical-design.md
  artifact: 테이블별 컬럼, 타입, 제약조건, 인덱스 전략, 정규화
  gate_intent:
  - 모든 엔티티가 테이블로 변환됨
  - PK/FK/UK 제약조건 명시됨
  - 인덱스 대상 컬럼이 식별됨
  - 정규화 수준(3NF 등)이 명시됨
  skills_intent:
  - db-design
- id: ddl
  name: 물리적 DB 설계 (DDL)
  dge: designer
  input:
  - logical-design.md
  output: schema.sql
  artifact: CREATE TABLE + INDEX DDL (대상 DB 호환)
  gate_intent:
  - 스키마 산출물이 빌드/생성 성공
  - 논리설계와 1:1 대응
  skills_intent:
  - database
- id: class-diagram
  name: 클래스 다이어그램
  dge: designer
  input:
  - logical-design.md
  - convention.md
  - flowchart.md
  output: class-diagram.md
  artifact: 도메인별 클래스 구조, 계층 관계, 의존성 방향
  gate_intent:
  - 도메인별 Controller/Service/Mapper/DTO 클래스가 식별됨
  - 계층 간 의존성 방향이 명시됨 (Controller→Service→Mapper)
  - DTO 간 변환 관계가 명시됨
  skills_intent:
  - backend
- id: api-spec
  name: API 요청/응답 명세
  dge: designer
  input:
  - prd.md
  - flowchart.md
  - logical-design.md
  - convention.md
  - class-diagram.md
  output: api-spec.md
  artifact: 엔드포인트별 Method, URL, Request Body, Response Body, 에러 코드
  gate_intent:
  - 모든 사용자 스토리에 대응하는 엔드포인트 존재
  - Request/Response 필드가 logical-design 컬럼과 정합
  - 에러 응답이 convention 에러 코드 체계를 따름
  - 각 엔드포인트에 요청/응답 JSON 예시가 포함됨
  skills_intent:
  - flow-design
- id: domain-module
  name: 도메인 모듈 명세 (Modulith)
  dge: designer
  input:
  - class-diagram.md
  - api-spec.md
  - er-diagram.md
  output: domain/{도메인명}.md
  artifact: 도메인별 책임/경계, 공개API vs 내부API, 이벤트 발행/구독, 외부 의존성
  gate_intent:
  - 각 도메인의 책임과 경계가 정의됨
  - 도메인 간 의존 방향이 명시됨 (순환 의존 없음)
  - 공개 API(다른 도메인이 호출 가능)와 내부 API가 구분됨
  skills_intent:
  - backend
- id: ci-setup
  name: CI 세팅 (GitHub Actions)
  dge: generator
  input:
  - convention.md
  output: .github/workflows/ci.yml
  artifact: PR 시 자동 빌드/테스트, JaCoCo 커버리지 검증, 품질 gate
  gate_intent:
  - PR 시 빌드+테스트 자동 실행
  - 커버리지 리포트 생성
  - 커버리지 미달 시 실패
  skills_intent:
  - devops
- id: scaffolding
  name: 프로젝트 뼈대
  dge: generator
  input:
  - convention.md
  - class-diagram.md
  output: build.gradle + application.yml + 공통 클래스
  artifact: 빌드 설정, DB 연결, 패키지 구조, 공통 DTO/예외
  gate_intent:
  - 빌드/컴파일 성공
  - 패키지 구조가 컨벤션과 일치
  - 관찰성(헬스체크) 의존성 포함
  skills_intent:
  - scaffolding
  - backend
- id: implementation
  name: 백엔드 + 프론트엔드 구현
  dge: generator
  input:
  - schema.sql
  - api-spec.md
  - flowchart.md
  - convention.md
  - domain/*.md (모듈 명세)
  - scaffolding 공통 클래스
  output: 도메인별 Controller + Service + Mapper + DTO + XML + 프론트엔드
  artifact: API 설계 + 플로우차트 + 모듈 명세대로 동작하는 코드
  gate_intent:
  - 빌드/컴파일 성공
  - 프론트엔드 빌드 성공(해당 시)
  - 모든 엔드포인트의 계층 체인 존재
  skills_intent:
  - backend
  - mybatis
  - redis
  - auth-jwt-oauth
- id: wiring-verify
  name: 와이어링 검증
  dge: evaluator
  input:
  - api-spec.md
  - implementation 결과물
  output: wiring-report.md
  artifact: 계층 간 연결 검증 결과
  gate_intent:
  - 헬스체크 200 OK
  - 계층 간 주입 무결성
  - 핸들러 매핑 존재
  skills_intent:
  - verification
- id: e2e-test
  name: E2E 테스트 (API)
  dge: evaluator
  input:
  - api-spec.md
  - requirements.md
  - convention.md
  output: e2e-report.md
  artifact: 스토리별 API 호출 결과 (성공 + 에러 케이스)
  gate_intent:
  - 모든 AC에 대응하는 호출 PASS
  - 에러 응답 형식이 컨벤션과 일치
  skills_intent:
  - verification
- id: blackbox-test
  name: 블랙박스 테스트 (Playwright MCP)
  dge: evaluator
  input:
  - flowchart.md
  - requirements.md
  - 구동 중인 서버 + 프론트엔드
  output: blackbox-report.md
  artifact: 에이전트가 브라우저로 직접 수행한 사용자 시나리오 테스트
  gate_intent:
  - 핵심 플로우 happy path가 UI에서 PASS
  - 에러 플로우 피드백 확인
  skills_intent:
  - verification
- id: unit-test
  name: Unit 테스트 (JaCoCo 100%)
  dge: evaluator
  input:
  - implementation 소스 코드
  output: src/test/ 테스트 클래스 + JaCoCo 리포트
  artifact: Service/DAO Mockito 단위 테스트, JaCoCo 커버리지 100%
  gate_intent:
  - 단위 테스트 0 failures
  - 커버리지 목표 달성
  - 각 공개 메서드 정상/예외 케이스
  skills_intent:
  - testing
- id: reliability-test
  name: 신뢰성 테스트 (FixtureMonkey + 엣지 + 컨테이너)
  dge: evaluator
  input:
  - api-spec.md
  - unit-test 통과된 코드
  output: reliability-report.md
  artifact: 랜덤 데이터 + 경계값 + 실제 DB 통합 테스트
  gate_intent:
  - 프로퍼티 기반 테스트 PASS
  - 엣지케이스 PASS
  - 실 DB 통합 테스트 PASS
  skills_intent:
  - testing
- id: monitoring
  name: 모니터링 (Actuator + Prometheus + Grafana)
  dge: generator
  input:
  - 구동 중인 서버
  output: Actuator 설정 + Prometheus 연동 + Grafana 대시보드
  artifact: DB/Redis 상태, 커넥션 메트릭 시각화 대시보드
  optional: true
  gate_intent:
  - 관찰성 엔드포인트 접근 가능
  - 메트릭 수집 중
  - 대시보드 시각화
  skills_intent:
  - devops
- id: cd-setup
  name: CD 세팅 (배포 자동화)
  dge: generator
  input:
  - .github/workflows/ci.yml
  - 모든 테스트 통과된 코드
  output: .github/workflows/cd.yml
  artifact: main/develop 머지 시 자동 배포 파이프라인
  optional: true
  gate_intent:
  - 통합 브랜치 머지 시 자동 빌드+배포
  skills_intent:
  - devops
- id: api-docs
  name: API 문서화 (Swagger)
  dge: generator
  input:
  - implementation 결과물
  output: SpringDoc 설정
  artifact: 브라우저 접근 가능한 API 문서
  optional: true
  gate_intent:
  - 브라우저에서 API 문서 접근 가능
  skills_intent:
  - backend
- id: batch
  name: Spring Batch (필요 시)
  dge: generator
  input:
  - prd.md
  - schema.sql
  output: Batch Job 클래스
  artifact: 집계/대용량 처리 배치 작업 (Tasklet 또는 Chunk)
  optional: true
  gate_intent:
  - 배치 작업 실행 성공
  - 처리 결과가 정확히 반영
  skills_intent:
  - backend
