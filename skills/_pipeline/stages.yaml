# stages.yaml — DGE 기반 단일 파이프라인
# 프로젝트별 오버라이드: {프로젝트}/.claude/stages.yaml
#
# 설계 원칙:
#   높은 응집도 — 각 단계는 하나의 명확한 산출물(artifact)에 책임
#   낮은 결합도 — 단계 간 통신은 명시적 artifact 계약으로만 (input → output)
#   이진 gate  — 자동 검증 가능한 조건으로만 통과 판정

# ===== DGE 사이클 (IMPORTANT) =====
# Designer  (올바른 것을 만드는가?)
#   - gate 미충족 시 다음 단계 진행 금지
#   - 복잡한 설계: Proposer-Critic 토론
#     (상태 머신, 워크플로우, 인증, 동시성, 조건 분기 3개+)
#
# Generator (설계대로 만들었는가?)
#   - input artifact만 근거로 구현 — 설계에 없는 것 임의 추가 금지
#   - 서브에이전트: Controller+Service 같은 에이전트 / Mapper XML엔 DDL 함께
#
# Evaluator (제대로 작동하는가?)
#   - 검증 실패 → Generator 회귀 → 수정 → 재검증
#   - 모든 Evaluator 완료 전 다음 슬라이스 금지

# ===== 슬라이스 (선택) =====
# 대규모 프로젝트에서 도메인 그룹별 파이프라인 반복
# reuse: true인 단계는 첫 슬라이스에서만 실행
#
# slices:
#   - name: "MVP"
#     domains: [user, product]
#   - name: "Sprint 2"
#     domains: [order, payment]
#     depends_on: ["MVP"]

# ===== 스테이지 정의 =====
stages:
  # ============================================================
  #  Designer — "올바른 것을 만드는가?"
  # ============================================================

  # --- 1. 요구사항 ---
  - id: requirements
    name: 요구사항 명세 (사용자 스토리)
    dge: designer
    input: "사용자 요구사항 (대화/문서)"
    output: requirements.md
    artifact: "도메인별 사용자 스토리 + 인수 조건(AC)"
    gate:
      - "모든 도메인에 1개 이상의 스토리가 존재"
      - "각 스토리에 AC(성공+에러 쌍)가 정의됨"
    skills: [doc-writer]

  # --- 2. PRD ---
  - id: prd
    name: PRD (상세 요구사항)
    dge: designer
    input: [requirements.md]
    output: prd.md
    artifact: "프로젝트 목표, 범위, 기능 명세, 비기능 요구사항, 용어 정의"
    gate:
      - "모든 스토리가 기능 명세로 상세화됨"
      - "비기능 요구사항(성능, 보안)이 수치로 명시됨"
      - "도메인 용어 사전이 존재"
    skills: [doc-writer]

  # --- 3. 플로우차트 ---
  - id: flowchart
    name: 도메인 플로우차트
    dge: designer
    input: [prd.md]
    output: flowchart.md
    artifact: "도메인별 사용자 흐름, 상태 전이, 분기 조건"
    gate:
      - "PRD 핵심 기능에 대응하는 플로우가 존재"
      - "분기 조건과 예외 흐름이 명시됨"
    skills: [flow-design]

  # --- 4. 컨벤션 ---
  - id: convention
    name: 프로젝트 컨벤션
    dge: designer
    input: [prd.md]
    output: convention.md
    artifact: "패키지 구조, 네이밍, 응답 형식, 에러 코드 규칙"
    gate:
      - "패키지 구조 테이블 존재"
      - "DTO 네이밍 규칙 존재"
      - "공통 응답 래퍼 형식 정의됨"
      - "에러 코드 체계 정의됨"
    skills: [convention]
    reuse: true

  # --- 5. 개념적 설계 ---
  - id: conceptual-design
    name: 개념적 DB 설계
    dge: designer
    input: [prd.md, flowchart.md]
    output: conceptual-design.md
    artifact: "엔티티 식별, 핵심 속성, 비즈니스 규칙 정리"
    gate:
      - "모든 도메인의 엔티티가 식별됨"
      - "엔티티별 핵심 속성이 나열됨"
      - "비즈니스 규칙(제약, 계산)이 명시됨"
    skills: [db-design]

  # --- 6. E-R 다이어그램 ---
  - id: er-diagram
    name: E-R 다이어그램
    dge: designer
    input: [conceptual-design.md]
    output: er-diagram.md
    artifact: "엔티티 관계도 (1:1, 1:N, M:N), 카디널리티, 참여 제약"
    gate:
      - "모든 엔티티 간 관계와 카디널리티가 시각화됨"
      - "M:N 관계의 해소 방안(교차 테이블)이 명시됨"
    skills: [db-design]
    # M:N, 상속, 복합키 → Proposer-Critic 토론

  # --- 7. 논리적 설계 ---
  - id: logical-design
    name: 논리적 DB 설계
    dge: designer
    input: [er-diagram.md, convention.md]
    output: logical-design.md
    artifact: "테이블별 컬럼, 타입, 제약조건, 인덱스 전략, 정규화"
    gate:
      - "모든 엔티티가 테이블로 변환됨"
      - "PK/FK/UK 제약조건 명시됨"
      - "인덱스 대상 컬럼이 식별됨"
      - "정규화 수준(3NF 등)이 명시됨"
    skills: [db-design]

  # --- 8. 물리적 설계 (DDL) ---
  - id: ddl
    name: 물리적 DB 설계 (DDL)
    dge: designer
    input: [logical-design.md]
    output: schema.sql
    artifact: "CREATE TABLE + INDEX DDL (대상 DB 호환)"
    gate:
      - "DDL이 대상 DB에서 실행 성공"
      - "모든 테이블이 logical-design과 1:1 대응"
    skills: [database]

  # --- 9. 클래스 다이어그램 ---
  - id: class-diagram
    name: 클래스 다이어그램
    dge: designer
    input: [logical-design.md, convention.md, flowchart.md]
    output: class-diagram.md
    artifact: "도메인별 클래스 구조, 계층 관계, 의존성 방향"
    gate:
      - "도메인별 Controller/Service/Mapper/DTO 클래스가 식별됨"
      - "계층 간 의존성 방향이 명시됨 (Controller→Service→Mapper)"
      - "DTO 간 변환 관계가 명시됨"
    skills: [backend]

  # --- 10. API 요청/응답 문서 ---
  - id: api-spec
    name: API 요청/응답 명세
    dge: designer
    input: [prd.md, flowchart.md, logical-design.md, convention.md, class-diagram.md]
    output: api-spec.md
    artifact: "엔드포인트별 Method, URL, Request Body, Response Body, 에러 코드"
    gate:
      - "모든 사용자 스토리에 대응하는 엔드포인트 존재"
      - "Request/Response 필드가 logical-design 컬럼과 정합"
      - "에러 응답이 convention 에러 코드 체계를 따름"
      - "각 엔드포인트에 요청/응답 JSON 예시가 포함됨"
    skills: [flow-design]

  # --- 11. 도메인 모듈 문서 ---
  - id: domain-module
    name: 도메인 모듈 명세 (Modulith)
    dge: designer
    input: [class-diagram.md, api-spec.md, er-diagram.md]
    output: "domain/{도메인명}.md"
    artifact: "도메인별 책임/경계, 공개API vs 내부API, 이벤트 발행/구독, 외부 의존성"
    gate:
      - "각 도메인의 책임과 경계가 정의됨"
      - "도메인 간 의존 방향이 명시됨 (순환 의존 없음)"
      - "공개 API(다른 도메인이 호출 가능)와 내부 API가 구분됨"
    skills: [backend]

  # ============================================================
  #  Generator — "설계대로 만들었는가?"
  # ============================================================

  # --- 12. CI 세팅 (0순위) ---
  - id: ci-setup
    name: CI 세팅 (GitHub Actions)
    dge: generator
    input: [convention.md]
    output: ".github/workflows/ci.yml"
    artifact: "PR 시 자동 빌드/테스트, JaCoCo 커버리지 검증, 품질 gate"
    gate:
      - "PR 생성 시 자동으로 빌드+테스트 실행됨"
      - "JaCoCo 커버리지 리포트 생성됨"
      - "커버리지 미달 시 빌드 실패 설정됨"
    skills: [devops]
    reuse: true
    # CI는 프로젝트 최초에 세팅 — scaffolding과 동시에

  # --- 13. 스캐폴딩 ---
  - id: scaffolding
    name: 프로젝트 뼈대
    dge: generator
    input: [convention.md, class-diagram.md]
    output: "build.gradle + application.yml + 공통 클래스"
    artifact: "빌드 설정, DB 연결, 패키지 구조, 공통 DTO/예외"
    gate:
      - "compileJava 성공"
      - "패키지 구조가 convention.md와 일치"
      - "Actuator 의존성 포함"
    skills: [scaffolding, backend]
    reuse: true

  # --- 14. 구현 ---
  - id: implementation
    name: 백엔드 + 프론트엔드 구현
    dge: generator
    input: [schema.sql, api-spec.md, flowchart.md, convention.md, "domain/*.md (모듈 명세)", "scaffolding 공통 클래스"]
    output: "도메인별 Controller + Service + Mapper + DTO + XML + 프론트엔드"
    artifact: "API 설계 + 플로우차트 + 모듈 명세대로 동작하는 코드"
    gate:
      - "백엔드: compileJava 성공"
      - "프론트엔드: build 성공 (해당 시)"
      - "모든 엔드포인트의 Controller→Service→Mapper 체인 존재"
    skills: [backend, mybatis, redis, auth-jwt-oauth]
    parallel: true

  # ============================================================
  #  Evaluator — "제대로 작동하는가?"
  # ============================================================

  # --- 15. 와이어링 검증 ---
  - id: wiring-verify
    name: 와이어링 검증
    dge: evaluator
    input: [api-spec.md, "implementation 결과물"]
    output: wiring-report.md
    artifact: "계층 간 연결 검증 결과"
    gate:
      - "/actuator/health 200 OK 확인"
      - "모든 Mapper XML namespace가 인터페이스와 매칭"
      - "모든 Service가 올바른 Mapper를 주입받음"
    skills: [verification]

  # --- 16. E2E 테스트 ---
  - id: e2e-test
    name: E2E 테스트 (API)
    dge: evaluator
    input: [api-spec.md, requirements.md, convention.md]
    output: e2e-report.md
    artifact: "스토리별 API 호출 결과 (성공 + 에러 케이스)"
    gate:
      - "모든 AC에 대응하는 curl 테스트 PASS"
      - "에러 케이스(404, 409, 400) 응답 형식이 convention과 일치"
    skills: [verification]

  # --- 17. 블랙박스 테스트 ---
  - id: blackbox-test
    name: 블랙박스 테스트 (Playwright MCP)
    dge: evaluator
    input: [flowchart.md, requirements.md, "구동 중인 서버 + 프론트엔드"]
    output: blackbox-report.md
    artifact: "에이전트가 브라우저로 직접 수행한 사용자 시나리오 테스트"
    gate:
      - "핵심 플로우의 happy path가 브라우저에서 PASS"
      - "에러 플로우의 UI 피드백 확인됨"
    skills: [verification]
    # Playwright MCP — 에이전트가 직접 크롬에서 테스트
    # 백엔드 온리 프로젝트에서는 skip

  # --- 18. Unit 테스트 + JaCoCo ---
  - id: unit-test
    name: Unit 테스트 (JaCoCo 100%)
    dge: evaluator
    input: ["implementation 소스 코드"]
    output: "src/test/ 테스트 클래스 + JaCoCo 리포트"
    artifact: "Service/DAO Mockito 단위 테스트, JaCoCo 커버리지 100%"
    gate:
      - "gradlew test 성공, 0 failures"
      - "JaCoCo 라인 커버리지 100%"
      - "각 Service 메서드에 정상/예외 케이스 존재"
    skills: [testing]

  # --- 19. 신뢰성 테스트 ---
  - id: reliability-test
    name: 신뢰성 테스트 (FixtureMonkey + 엣지 + 컨테이너)
    dge: evaluator
    input: [api-spec.md, "unit-test 통과된 코드"]
    output: reliability-report.md
    artifact: "랜덤 데이터 + 경계값 + 실제 DB 통합 테스트"
    gate:
      - "FixtureMonkey 프로퍼티 기반 테스트 PASS"
      - "엣지케이스(경계값, null, 빈 문자열, 대량 데이터) PASS"
      - "Testcontainers 실제 DB 연동 테스트 PASS"
    skills: [testing]

  # ============================================================
  #  운영 (개발 완료 후)
  # ============================================================

  # --- 20. 모니터링 ---
  - id: monitoring
    name: 모니터링 (Actuator + Prometheus + Grafana)
    dge: generator
    input: ["구동 중인 서버"]
    output: "Actuator 설정 + Prometheus 연동 + Grafana 대시보드"
    artifact: "DB/Redis 상태, 커넥션 메트릭 시각화 대시보드"
    gate:
      - "Actuator /health, /metrics 엔드포인트 접근 가능"
      - "Prometheus가 메트릭 수집 중"
      - "Grafana 대시보드에서 메트릭 시각화 확인"
    skills: [devops]
    optional: true

  # --- 21. CD ---
  - id: cd-setup
    name: CD 세팅 (배포 자동화)
    dge: generator
    input: [".github/workflows/ci.yml", "모든 테스트 통과된 코드"]
    output: ".github/workflows/cd.yml"
    artifact: "main/develop 머지 시 자동 배포 파이프라인"
    gate:
      - "develop 브랜치 머지 시 자동 빌드+배포 실행됨"
    skills: [devops]
    optional: true

  # --- 22. API 문서화 ---
  - id: api-docs
    name: API 문서화 (Swagger)
    dge: generator
    input: ["implementation 결과물"]
    output: "SpringDoc 설정"
    artifact: "브라우저 접근 가능한 API 문서"
    gate:
      - "http://localhost:PORT/swagger-ui 접근 가능"
    skills: [backend]
    optional: true

  # --- 23. Batch ---
  - id: batch
    name: Spring Batch (필요 시)
    dge: generator
    input: [prd.md, schema.sql]
    output: "Batch Job 클래스"
    artifact: "집계/대용량 처리 배치 작업 (Tasklet 또는 Chunk)"
    gate:
      - "배치 Job 실행 성공"
      - "처리 결과가 DB에 정확히 반영됨"
    skills: [backend]
    optional: true
    # Tasklet: 간단한 로직 / Chunk: 대용량 트랜잭션 단위 제어

# 커스터마이징:
# - 백엔드 온리: blackbox-test skip, implementation에서 프론트 제외
# - 경량화: conceptual-design + er-diagram + logical-design을 db-design으로 합침
# - 보안 감사: implementation 뒤에 security-audit 삽입
# - 성능 테스트: reliability-test 뒤에 performance-test 추가
