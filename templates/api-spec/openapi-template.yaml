openapi: 3.0.3
info:
  title: "{{프로젝트명}} API"
  version: "1.0.0"
  description: |
    {{프로젝트 설명}}

    Generated from PRD: requirements/domain/*.md
    Convention: .claude/convention.md

servers:
  - url: "http://localhost:{{포트}}/api"
    description: Local development

# ──────────────────────────────────────────────
# 공통 컴포넌트 (convention.md에서 추출)
# ──────────────────────────────────────────────
components:
  schemas:
    # 공통 응답 래퍼
    CommonResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: "OK"
        data:
          type: object

    # 에러 응답
    ErrorResponse:
      type: object
      required: [status, code, message, timestamp, path]
      properties:
        status:
          type: integer
        code:
          type: string
          description: "도메인 접두사 + 번호 (예: U001, O001)"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        errors:
          type: array
          description: "검증 에러(400) 시에만 포함"
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      properties:
        field:
          type: string
        value: {}
        reason:
          type: string

    # 페이지네이션 응답
    PageResponse:
      type: object
      properties:
        content:
          type: array
          items: {}
        page:
          type: integer
          description: "0-based"
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ──────────────────────────────────────────
    # 도메인 스키마 (PRD domain/*.md + DB설계에서 추출)
    # ──────────────────────────────────────────

    # {{도메인1}} 스키마
    "{{도메인1}}Response":
      type: object
      properties:
        id:
          type: integer
          format: int64
        # {{PRD AC의 응답 필드들}}
        createdAt:
          type: string
          format: date-time

    "{{도메인1}}CreateRequest":
      type: object
      required: ["{{필수필드들}}"]
      properties:
        # {{PRD AC의 요청 필드들}}
        "{{필드명}}":
          type: "{{타입}}"

    "{{도메인1}}Status":
      type: string
      enum: ["{{상태값들 — PRD 상태 전이 규칙에서 추출}}"]

  # 공통 파라미터
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: "{{기본 페이지 크기}}"
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        example: "createdAt,desc"

  # 공통 응답
  responses:
    BadRequest:
      description: "잘못된 요청 (유효성 실패)"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "리소스 없음"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: "권한 없음"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: "충돌/중복"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

# ──────────────────────────────────────────────
# 경로 (PRD domain/*.md AC의 When 절에서 추출)
# ──────────────────────────────────────────────
paths:
  # {{도메인1}} 엔드포인트
  "/{{리소스(복수형)}}":
    get:
      tags: ["{{도메인1}}"]
      summary: "{{도메인1}} 목록 조회"
      operationId: "list{{도메인1}}"
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        # {{PRD AC의 필터 파라미터들}}
      responses:
        "200":
          description: "목록 조회 성공"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CommonResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResponse"
      # PRD 추적: US-0XX

    post:
      tags: ["{{도메인1}}"]
      summary: "{{도메인1}} 생성"
      operationId: "create{{도메인1}}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/{{도메인1}}CreateRequest"
      responses:
        "201":
          description: "생성 성공"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CommonResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/{{도메인1}}Response"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
      # PRD 추적: US-0XX

  "/{{리소스(복수형)}}/{id}":
    get:
      tags: ["{{도메인1}}"]
      summary: "{{도메인1}} 상세 조회"
      operationId: "get{{도메인1}}"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "조회 성공"
        "404":
          $ref: "#/components/responses/NotFound"
      # PRD 추적: US-0XX

    put:
      tags: ["{{도메인1}}"]
      summary: "{{도메인1}} 수정"
      operationId: "update{{도메인1}}"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "수정 성공"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
      # PRD 추적: US-0XX

    delete:
      tags: ["{{도메인1}}"]
      summary: "{{도메인1}} 삭제"
      operationId: "delete{{도메인1}}"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: "삭제 성공"
        "404":
          $ref: "#/components/responses/NotFound"
      # PRD 추적: US-0XX

# ──────────────────────────────────────────────
# 작성 체크리스트 (YAML 주석)
# ──────────────────────────────────────────────
# - [ ] PRD domain/*.md의 모든 API 엔드포인트가 paths에 포함
# - [ ] 모든 성공 응답(2XX)에 대응하는 에러 응답(4XX) 정의
# - [ ] schema 필드명 = convention.md JSON 필드 네이밍 (camelCase)
# - [ ] enum 값 = PRD 상태 전이 규칙의 상태값
# - [ ] 페이지네이션 응답 = convention.md 페이지네이션 형식
# - [ ] 에러 응답 = convention.md 에러 응답 형식
# - [ ] 모든 경로에 PRD US ID 추적 주석
# - [ ] securitySchemes = PRD nfr.md 보안 요구사항
